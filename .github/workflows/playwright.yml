name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      browser:
        description: "Which browser to run against"
        type: choice
        default: chromium
        options:
          - chromium
          - firefox
          - webkit
      module:
        description: "Which module/feature to run"
        type: choice
        default: all
        options:
          - all
          - browse-skills
          - home
          - navigation
          - skill-detail
      grep:
        description: "Optional: only run tests whose title matches this text"
        type: string
        required: false
        default: ""

jobs:
  test:
    name: Run Playwright tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Install Playwright browsers
        env:
          BROWSER: ${{ github.event.inputs.browser || 'chromium' }}
        run: npx playwright install --with-deps "$BROWSER"

      - name: Run Playwright tests
        env:
          BROWSER: ${{ github.event.inputs.browser || 'chromium' }}
          MODULE: ${{ github.event.inputs.module || 'all' }}
          GREP: ${{ github.event.inputs.grep || '' }}
        run: |
          ARGS=("--project=${BROWSER}")
          if [ "$MODULE" != "all" ] && [ -n "$MODULE" ]; then
            ARGS+=("tests/e2e/${MODULE}.spec.ts")
          fi
          if [ -n "$GREP" ]; then
            ARGS+=("--grep" "$GREP")
          fi
          echo "Running: npx playwright test ${ARGS[*]}"
          npx playwright test "${ARGS[@]}"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
